
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreeViz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #262626; /* Matte dark gray background */
        }
        .fira-code {
            font-family: 'Fira Code', monospace;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        /* Hardware UI Classes */
        .hw-panel {
            background: #222222;
            border: 1px solid #111111;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.6), -2px -2px 5px rgba(255,255,255,0.03);
            border-radius: 2px;
        }
        .hw-screen {
            background: #050505;
            border-top: 1px solid #000000;
            border-left: 1px solid #000000;
            border-bottom: 1px solid #1a1a1a;
            border-right: 1px solid #1a1a1a;
            box-shadow: inset 2px 2px 10px rgba(0,0,0,1);
            border-radius: 2px;
        }
        .hw-button {
            background: #222222;
            border-top: 1px solid #333333;
            border-left: 1px solid #333333;
            border-bottom: 1px solid #0a0a0a;
            border-right: 1px solid #0a0a0a;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            border-radius: 2px;
            transition: all 0.1s ease;
            color: #888888;
        }
        .hw-button:hover {
            color: #aaaaaa;
            background: #252525;
        }
        .hw-button:active, .hw-button.active {
            background: #1a1a1a;
            border-top: 1px solid #000000;
            border-left: 1px solid #000000;
            border-bottom: 1px solid #222222;
            border-right: 1px solid #222222;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.8);
            color: #ffffff;
        }
        .hw-button.active-accent {
            color: #60a5fa; /* Blue accent for active state */
        }
        .hw-input {
            background: #111111;
            border-top: 1px solid #000000;
            border-left: 1px solid #000000;
            border-bottom: 1px solid #222222;
            border-right: 1px solid #222222;
            box-shadow: inset 1px 1px 4px rgba(0,0,0,0.8);
            color: #aaaaaa;
            border-radius: 2px;
        }
        .hw-input:focus {
            outline: none;
            color: #ffffff;
            border-bottom: 1px solid #3b82f6;
        }
        
        /* Thin grid lines for grouped buttons */
        .hw-grid-container {
            background: #111;
            gap: 1px;
            padding: 1px;
            border: 1px solid #111;
            border-radius: 2px;
        }
        .hw-grid-item {
            background: #222;
            border: none;
            box-shadow: none;
            border-radius: 0;
        }
        .hw-grid-item:active, .hw-grid-item.active {
            background: #1a1a1a;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.8);
            border: none;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@react-three/fiber": "https://esm.sh/@react-three/fiber@^9.5.0",
    "three": "https://esm.sh/three@^0.182.0",
    "@react-three/drei": "https://esm.sh/@react-three/drei@^10.7.7",
    "three/": "https://esm.sh/three@^0.182.0/",
    "@react-three/postprocessing": "https://esm.sh/@react-three/postprocessing@^3.0.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
